name: 'dns_cf_dx_push'

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5  # ✨ 已升级至最新主版本 v5，原生支持 Node 24

      - name: 'Set up Python'
        uses: actions/setup-python@v6  # ✨ 已升级至最新主版本 v6，原生支持 Node 24
        with:
          python-version: 3.12

      - name: 'Install dependencies'
        run: |
          pip install requests  # ✨ 只需极简的网络请求库，无需 Playwright 等重型依赖

      - name: 'run dnscf_dx'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_DNS_NAME: ${{ secrets.CF_DNS_NAME }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python dnscf_dx.py
