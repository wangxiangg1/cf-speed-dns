name: 'dns_cf_dx_push'

on:
  schedule:
    # 每天北京时间 08:00 到次日 01:59 期间，每 20 分钟运行一次。北京时间凌晨 2 到 8 点停止触发。
    # 额度消耗测算：每天活跃 18 小时，每小时 3 次，共 54 次。每月约消耗 1620 分钟，处于绝对安全范围内。
    - cron: '*/20 0-17 * * *'  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5  # ✨ 已升级至最新主版本 v5，原生支持 Node 24

      - name: 'Set up Python'
        uses: actions/setup-python@v6  # ✨ 已升级至最新主版本 v6，原生支持 Node 24
        with:
          python-version: 3.12

      - name: 'Install dependencies'
        run: |
          pip install requests  # ✨ 极简依赖，运行神速

      - name: 'run dnscf_dx'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_DNS_NAME: ${{ secrets.CF_DNS_NAME }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python dnscf_dx.py
